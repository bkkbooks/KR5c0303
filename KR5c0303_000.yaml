front:
  text: 參同契五相類祕要似八
  hash: sha256:4797e1ee3a42a7349e601be401f6dd0b8a59c7bbb17f1c78763477d34f23ba14
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0303_HFL_000-001a, image: hfl/0589/0589-026.png}
body:
  text: 太素真人魏伯陽演宣德郎權發遣提舉淮南西路學事賜緋魚袋臣盧天驥上進陽一二三四五水火木金土陰六七八九十昔真人魏伯陽與淳于叔通授青州徐從事參同契及古歌魏君丹成撰此五相類後昇雲而去令弟子大篆諸本並無皆云參同契中卷是也深屬淺見矣且五相類者論諸相類伏制三黄二寶也故云五也篇曰天生元女者水銀也地生黄男者黄金也皆禀性太和微妙之炁左陽右陰即位而相通謂水銀與金是天地冲和之正炁而生初爲朱砂屬左居東方後化爲水銀居西方爲右是借位也張翼飛虚危此乃一變也張翼南方朱砂也虚危北方宿是汞從朱砂中所化出乃從南飛向北方即是一變也受生之性一化爲丹反砂爲汞反汞爲丹是丹一化矣既定昇騰上宫宫南方朱宫定汞變化也即無任萬物矣爲汞任化萬物也太陽白汞汞水銀也陰之精者也本含赤水汞本是生出朱砂故云含赤水者也返我丹液返汞爲朱砂是夫婦也汞本是朱砂也純黑精元含青是也黑鉛者汞色青也位屬東方爲朱是木精故云青也今四象定本各有解者則從性而和之悟者易迷者難悟者甚易迷者甚難元精春隨斗柄元精子汞也十一月建子春陽炁生故十一月受陽分寸言十一月斗建子起首也且東西互相吞也東方朱西方銀以二物相吞之也陰凌據在酉來往中宫中宫雄黄也陰汞酉金二物相據初伏雄炁凌汞也二姓合和以金和汞也一云以汞和砂也爲妻爲子爲母爲君爲臣爲佐水銀用鉛爲妻亦如子母君臣也今得節符而制御之如水滅火火必伏矣若依時節火候進退五行轉制金汞自伏矣直符直事定昇降而必成今參同以五行内外六律皆定分兩而知同類夫大丹若不依陰陽五行刻定同類必不得成之矣今所説五行赤髓同類太陽水銀是太陽赤髓朱砂汞也又名太陽汞太陽是朱砂之别名也太陽雄黄雄精含受太陰雌黄凝津同類是還丹之大道也雄精雄黄也陰津雌黄也此是大還丹别名也且雄類於硇砂雄得硇砂入鍋子内須臾成水如血汁日夕火燒閉塞已伏故知不謬矣夫雄不得硇砂色不行雌黄類於蜜水貝母入小鍋子消雌煞以貝母末急攪之後瀉出蜜水中各不損本性自餘方法甚難同類勿可信之也砒黄得石脂立凝而不飛入磁末築入筒中火之二十日而伏將此伏不失本體石硫黄入磁石殊汁煎而同類殊鹵殊也將入磁器中煎不得令有燄及有火不沸火亦不得用武成帝硫流五化五金百日而煎畢之矣汞類亭脂得火倏忽成水亭脂硫黄也成水急取之遲即有火出自燒至七徧作中還丹餌之長生堪點化也亭脂是石硫黄化汞爲朱砂汞得石硫黄更不動爲被土制也硫黄屬土汞被制如泥入爐燒成丹砂太陰山魂類同砂子立成白泥砂子汞也山魂雌黄和銀下養之十五日辛酉金之位也太陽丹魂朱砂同類於醇醯醯大春酒也從三月入泮至五月盛日中安泮之自然返爲霜豈不信乎此陰陽自化爲還丹與俗之異皆天地自然之理何言人能制造化而得成也鉛同類於桑灰死魂入灰坯鍊九徧後入赤鳥脚脂霜成九徧神仙丹理八石五金人餌者長生也錫類蜜陀僧加五色山魂山魂者五種石脂也成霜五色將以入砂牛津中塗丹釜上木盆子合頭飛之從寅至戌伏盆霜二十日武火晝夜不止金鼎五金不愛大祕其霜五色無比也鏹同類於重砂子魂精精者結砂言砂入漏爐藥五十徧後鏹三五數成白金可以立救貧乏矣波斯折鍮五斤入素白霜而同類波斯鍮石五斤白霜是銀和土鍋上以到行神骨覆之厚五寸一時一徧入陰獸汁淋取實堅漸漸與火三季是成鍮屑之獸汁者黑牛尿到行神骨是戎食鹽也崑崙同類羯羊崑崙曾青也似羊津是羊脂也曾青治之如粉津拌羊脂入砂甑蒸十五徧後於小室中伏不問五金總可爲依伏法勿使精華炁岀飛可十周成青龍翹立制朱元精汞也汞素亦可制丹陽赤銅也空類於代丹空即空青也代丹代赭也同於鉢中研如粉以元精拌之入砂甑中蒸之後入黄土堝中固濟子東炭燒之二十日立化五金乾汞須臾成白金亦救世之法元津是鹵殊汁亦號太陰元精也陰伏金公倏忽於飛霜陽制立要亭脂亭脂硫黄也金公飛霜以水銀須臾成黑泥入豐城磁器中得絳霜還精大祕矣子受母即被褐而留之子水銀也母銀是也母變子即有庚而句定庚金也子汞被銀丹句定也因轉成物即用之根微畢伏之緣摯不使飛凝實賴太陽陽合汞也而相俱敵互爲化用汞銀同敵互相制伏也亦能空同洞長以金爲號昇降是空大剛若欲飛魂至九歸命七符不還九是朱七是汞也歸金成丹餌之即神魂長生與日月天地齊畢矣返成五行父母君臣如何可置大丹次也汞屬五行之一爲父母君臣能制御之返爲大丹者也吾見諸家所説皆自謂我能不辨陰陽不知同類或大聖隱説其訣又不解看用意自裁殊失聖旨夫欲知爐火制御石藥須尋方疏志閑經術必洞曉古人之文更致意思即是大道也今諸山名洞遂尋師旨各各不同但多經方諸家盡説義解商量亦自能下手皆稱云須諸方疏細義推陰陽至理而知同者矣龍馬受駕龍乾也馬坤也器物是也龍虎相吞龍汞虎銀二物相和交互相吞食也男女交媾男女交媾男雄女雌二黄和其金汞者也父子善欽父朱子汞母變含類母金含汞子也白赤相浮白礬赤鹽黑青俱拘黑銀曾青左旋六神從子至巳已歷我宫謂從汞爲朱砂從子是汞轉到於巳午返汞爲赤砂矣從來右轉暫過故符天地謂汞自左至于右成金之體也周巡八節而定四時迭凑争先依二至定日時養火矣以驗五之位也五土也謂雄雌合炁也讚曰至聖大賢著在三變朱在南方又屬東方水銀又屬北方也各知部位龍虎争先赤髓漸紫虎銀龍汞赤是丹砂丹砂者爲赤色之名也白礬通元特生礬石内有明礬能制汞也載我八石三黄五金是曰八石俱定乾乾北方汞爲金也設陳五方五方者朱砂當於五行陳設令相合雜類難言定取赤帝赤帝汞别名也率土五捐批母之義子特行之去石也用一拘九一銀九汞也金拘汞而相制伏也將五定七七金也五雌黄也一炁三節一炁十五日五日一節也七八合成七八之道七汞七兩八銀八兩一云七八乃十五日而成象也即還丹之見焉使礬石即用三使藥三使石膽黄白二礬用二青曾空謂也而不得用太陰元水石鹵鹽是也雄雌砒黄三徧霜也石硫黄以火溜過用水石鹽煮之一月令伏火此四黄煎制即不用五礬之類也二礬蒼持用火之訣長先文短用武即不失制也大丹藥不得下著生炭須熟火也歌曰稜深長合取陰陽鼎器狀如仰月亦如毬子兩頭以下稜合著上稜須著意作之不令小有參差底厚能存藥永昌謂以鉛銀爲之如混沌之形存養神藥以獲昌隆也太陽流珠入華池流珠汞也黑池左味用煮汞銀用結了砂子和研之入器用矣赤鹽白雪成雄雌礬鹽合煉以成赤色故號曰赤鹽用以飛造丹之霜雪也白雪並雌雄二雪皆其名矣去道非遠人不知言法目前而人不知赤龍化爲粉汞化爲赤粉白虎利如霜鉛和汞一時總變如霜雪也其中投石液石液謂硫黄也還用帝流漿伏制石液當用玄帝流漿玄帝流漿者磁母之液也調神五藏清調持運火存養五行神炁於丹室之中如人能保五藏於清肅也欲得煉三黄鉛汞須得伏火三黄以返純陽之質三黄屬土土能生金故用之矣兼性太熱並是太陽之精汞冷故用之三黄一雄一雌一硫是也曾青能通神明是金之苗爲金之使雄雌硫金乃爲之華也夫大還丹用鉛爲主用水銀爲君硫黄爲臣雄黄爲將雌爲佐曾青爲使故君臣配合主將拘伏使佐宣通雖用借爲傍助久久爲伏火灰矣未審堅性素汞堅銀也未審分辨之性也謂子母如未分如何使陰陽陰陽乾坤是矣謂先定二藥及鼎器伏制火記運用乾坤二卦遞相承制也從子到辰巳爲直符從午到戌亥爲直事體法卦象定火數也參同契五相類祕要
